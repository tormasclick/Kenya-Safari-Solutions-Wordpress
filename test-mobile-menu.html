<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white">
    <div class="p-4">
        <button id="test-mobile-btn" class="bg-blue-500 text-white px-4 py-2 rounded">
            Toggle Menu
        </button>
        <div id="test-mobile-menu" class="hidden mt-2 p-4 bg-gray-200 rounded">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Safaris</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </div>
    </div>
    
    <script>
        const btn = document.getElementById('test-mobile-btn');
        const menu = document.getElementById('test-mobile-menu');
        
        if (btn && menu) {
            btn.addEventListener('click', function() {
                menu.classList.toggle('hidden');
                console.log('Menu toggled, hidden:', menu.classList.contains('hidden'));
            });
        }
    </script>
</body>
</html>
